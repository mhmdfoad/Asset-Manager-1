kind = "web"
previewPath = "/"
title = "Next.js Storefront"
version = "1.0.0"
id = "artifacts/next-storefront"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20792

[services.development]
run = "pnpm --filter @workspace/next-storefront run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/next-storefront", "run", "build" ]

[services.production.run]
args = [ "pnpm", "--filter", "@workspace/next-storefront", "run", "start" ]

[services.production.run.env]
PORT = "20792"
NODE_ENV = "production"

[services.env]
PORT = "20792"
BASE_PATH = "/"
