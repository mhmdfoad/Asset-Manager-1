kind = "web"
previewPath = "/"
title = "Next.js Storefront"
version = "1.0.0"
id = "artifacts/next-storefront"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20792

[services.development]
run = "pnpm --filter @workspace/next-storefront run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/next-storefront", "run", "build" ]
serve = "static"
publicDir = "artifacts/next-storefront/.next/standalone"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20792"
BASE_PATH = "/"
